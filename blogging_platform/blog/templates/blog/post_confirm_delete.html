{% extends 'blog/base.html' %}

{% block title %}Delete Post - {{ post.title }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h3 class="card-title mb-0">Delete Post</h3>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete the post: <strong>"{{ post.title }}"</strong>?</p>
                    <p class="text-danger small">This action cannot be undone.</p>
                </div>
                <div class="card-footer d-flex justify-content-between">
                    <a href="{% url 'post_detail' post.id %}" class="btn btn-secondary">Cancel</a>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
